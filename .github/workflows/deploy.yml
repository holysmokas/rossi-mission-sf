name: Build and Deploy to GitHub Pages (docs folder)

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.js'
      - 'package.json'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Copy build to docs and update README timestamp
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Replace docs folder with new build
          rm -rf docs
          mkdir docs
          cp -r dist/* docs/

          # Update README with new timestamp
          timestamp=$(date -u "+%Y-%m-%d %H:%M UTC")
          sed -i "s|<!--LAST_DEPLOY-->.*<!--END_LAST_DEPLOY-->|<!--LAST_DEPLOY--> $timestamp <!--END_LAST_DEPLOY-->|" README.md

          # Commit and push both changes together
          git add docs README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-deploy build and update README timestamp"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/holysmokas/rossi-mission-sf.git HEAD:main
          fi
